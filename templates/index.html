<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 关键：手机自适应必须加这行 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>批量照片上传工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
        }

        .box {
            border: 1px solid #ccc;
            padding: 25px 20px;
            border-radius: 12px;
            background: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        h3 {
            margin: 20px 0 10px;
            color: #333;
            font-size: 18px;
        }

        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 8px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px; /* 手机端文字够大 */
        }

        input[type="file"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px dashed #ccc;
            border-radius: 8px;
            font-size: 15px;
            background: #f9f9f9;
        }

        button {
            width: 100%; /* 手机端按钮全屏宽 */
            padding: 16px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 17px;
            font-weight: bold;
            margin-top: 10px;
        }

        button:active {
            background: #0066cc;
        }

        .msg {
            color: #009933;
            margin: 15px 0;
            padding: 12px;
            background: #f0fff4;
            border-radius: 6px;
            text-align: center;
            font-size: 15px;
        }

        /* 小屏手机优化 */
        @media (max-width: 400px) {
            .box {
                padding: 20px 15px;
            }
            h3 {
                font-size: 17px;
            }
        }
    </style>
</head>
<body>
    <div class="box">
        <h3>第一步：填写本地盘 / 网络盘 保存路径</h3>
        <p>示例：D:/照片  或  已映射网络盘 Z:/共享图片</p>
        <form action="/upload" method="post" enctype="multipart/form-data">
            <input type="text" name="save_dir" placeholder="粘贴文件夹绝对路径" value="{{ last_path }}" required>

            <h3>第二步：选择多张照片</h3>
            <input type="file" name="photos" multiple accept="image/*" required>

            <button type="submit">确认上传保存</button>
        </form>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for msg in messages %}
                    <div class="msg">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
    </div>
</body>
</html>
